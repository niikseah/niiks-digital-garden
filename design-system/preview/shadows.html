<!doctype html><html data-theme="night"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);color:var(--fg-1);padding:26px;font-family:var(--font-body);font-size:11px}
.row{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.card{background:var(--midnight-850);width:120px;height:70px;border-radius:14px;border:1px solid var(--border-1);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
.l{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-align:center;margin-top:8px}
.col{display:flex;flex-direction:column}
  <link rel="stylesheet" href="../../shared/shell.css" />
  <link rel="stylesheet" href="../../shared/phase1-ds-bridge.css" />
</head><body>
<div class="eyebrow" style="margin-bottom:14px">Shadows &amp; glow</div>
<div class="row">
  <div class="col"><div class="card" style="box-shadow:var(--shadow-1)">shadow-1</div><div class="l">neutral drop</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--shadow-2)">shadow-2</div><div class="l">raised</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--shadow-3)">shadow-3</div><div class="l">modal</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--glow-sm);border-color:rgba(124,184,255,.28)">glow-sm</div><div class="l">focus ★</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--glow-md);border-color:rgba(124,184,255,.28)">glow-md</div><div class="l">hover</div></div>
  <div class="col"><div class="card" style="box-shadow:var(--glow-lg);border-color:rgba(124,184,255,.40)">glow-lg</div><div class="l">hero</div></div>
</div>
</body></html>
