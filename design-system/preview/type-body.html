<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);color:var(--fg-1);padding:22px 24px;font-family:var(--font-body);font-size:14px;line-height:1.5}</style>
  <link rel="stylesheet" href="../../shared/shell.css" />
  <link rel="stylesheet" href="../../shared/phase1-ds-bridge.css" />
</head><body>
<div class="eyebrow" style="margin-bottom:10px">Body · Helvetica Neue</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
  <div>
    <div style="font-weight:300">300 — Light. Once in a while.</div>
    <div style="font-weight:400">400 — Roman. The default for all body copy.</div>
    <div style="font-weight:500">500 — Medium. Eyebrows, small labels.</div>
    <div style="font-weight:700">700 — Bold. Emphasis inside body text.</div>
  </div>
  <div>
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2)">const note = "planted";</div>
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--electric-200);margin-top:2px">// JetBrains Mono · 400</div>
    <div style="margin-top:10px">
      <kbd style="font-family:var(--font-mono);font-size:11px;background:var(--midnight-800);border:1px solid var(--border-1);padding:2px 6px;border-radius:4px">⌘</kbd>
      <kbd style="font-family:var(--font-mono);font-size:11px;background:var(--midnight-800);border:1px solid var(--border-1);padding:2px 6px;border-radius:4px">K</kbd>
      <span style="font-size:12px;color:var(--fg-3);margin-left:6px">command palette</span>
    </div>
  </div>
</div>
</body></html>
