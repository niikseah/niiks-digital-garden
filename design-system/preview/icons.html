<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>body{margin:0;background:var(--bg-1);color:var(--fg-1);padding:22px 24px;font-family:var(--font-body);font-size:12px}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:14px}
.i{display:flex;flex-direction:column;align-items:center;gap:6px}
.i svg{stroke-width:1.5;width:22px;height:22px;color:var(--fg-1)}
.i .l{font-family:var(--font-mono);font-size:9px;color:var(--fg-4)}
  <link rel="stylesheet" href="../../shared/shell.css" />
  <link rel="stylesheet" href="../../shared/phase1-ds-bridge.css" />
</head><body>
<div class="eyebrow" style="margin-bottom:12px">Iconography · Lucide · 1.5 stroke · currentColor <span style="color:var(--amber);text-transform:none;letter-spacing:0;margin-left:8px">⚑ substituted — codebase had no set</span></div>
<div class="grid">
  <div class="i"><i data-lucide="sprout"></i><span class="l">sprout</span></div>
  <div class="i"><i data-lucide="leaf"></i><span class="l">leaf</span></div>
  <div class="i"><i data-lucide="feather"></i><span class="l">feather</span></div>
  <div class="i"><i data-lucide="book-open"></i><span class="l">book</span></div>
  <div class="i"><i data-lucide="bookmark"></i><span class="l">bookmark</span></div>
  <div class="i"><i data-lucide="search"></i><span class="l">search</span></div>
  <div class="i"><i data-lucide="moon"></i><span class="l">moon</span></div>
  <div class="i"><i data-lucide="sun"></i><span class="l">sun</span></div>
  <div class="i"><i data-lucide="link"></i><span class="l">link</span></div>
  <div class="i"><i data-lucide="tag"></i><span class="l">tag</span></div>
  <div class="i"><i data-lucide="pencil"></i><span class="l">pencil</span></div>
  <div class="i"><i data-lucide="archive"></i><span class="l">archive</span></div>
  <div class="i"><i data-lucide="calendar"></i><span class="l">calendar</span></div>
  <div class="i"><i data-lucide="clock"></i><span class="l">clock</span></div>
  <div class="i"><i data-lucide="hash"></i><span class="l">hash</span></div>
  <div class="i"><i data-lucide="arrow-right"></i><span class="l">→</span></div>
  <div class="i"><i data-lucide="arrow-up-right"></i><span class="l">↗</span></div>
  <div class="i"><i data-lucide="corner-down-right"></i><span class="l">↩</span></div>
  <div class="i"><i data-lucide="rss"></i><span class="l">rss</span></div>
  <div class="i"><i data-lucide="sparkles"></i><span class="l">spark</span></div>
</div>
<script>lucide.createIcons()</script>
</body></html>
