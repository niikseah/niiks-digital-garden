<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:var(--bg-1);color:var(--fg-1);padding:22px 24px;font-family:var(--font-body);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-family:var(--font-body);font-weight:500;border:1px solid var(--border-1)}
.dot{width:6px;height:6px;border-radius:50%}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.l{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-bottom:6px;letter-spacing:.1em;text-transform:uppercase}
  <link rel="stylesheet" href="../../shared/shell.css" />
  <link rel="stylesheet" href="../../shared/phase1-ds-bridge.css" />
</head><body>
<div class="l">States · garden semantic</div>
<div class="row">
  <span class="badge" style="color:#6fb38a;background:rgba(111,179,138,.1);border-color:rgba(111,179,138,.35)"><span class="dot" style="background:#6fb38a"></span>Seedling</span>
  <span class="badge" style="color:#e89bc2;background:rgba(232,155,194,.1);border-color:rgba(232,155,194,.35)"><span class="dot" style="background:#e89bc2"></span>Budding</span>
  <span class="badge" style="color:#f0b35a;background:rgba(240,179,90,.1);border-color:rgba(240,179,90,.35)"><span class="dot" style="background:#f0b35a"></span>Evergreen ✺</span>
  <span class="badge" style="color:#e8697a;background:rgba(232,105,122,.1);border-color:rgba(232,105,122,.35)"><span class="dot" style="background:#e8697a"></span>Uprooted</span>
</div>
<div class="l">Tags</div>
<div class="row">
  <span class="badge" style="color:var(--fg-2)">writing</span>
  <span class="badge" style="color:var(--fg-2)">gardening</span>
  <span class="badge" style="color:var(--fg-2)">now · 2026</span>
  <span class="badge" style="color:var(--electric-glow);border-color:rgba(124,184,255,.35)">featured</span>
</div>
</body></html>
