<!doctype html>
<html lang="en" data-theme="day">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>projects — niik</title>
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <link rel="stylesheet" href="shared/shell.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="shared/data.js"></script>
  <script src="shared/components.js"></script>
  <style>
    .port-head {
      padding: clamp(72px, 8vw, 104px) 0 40px;
      border-bottom: 1px dashed var(--border-2);
      margin-bottom: 26px;
    }
    .port-head h1 {
      font-family: var(--font-display);
      font-size: clamp(44px, 6vw, 72px);
      font-weight: 400;
      letter-spacing: -0.028em;
      line-height: 1.02;
      color: var(--fg-1);
      margin: 14px 0 0;
      max-width: 14ch;
    }
    .port-head h1 em { font-style: italic; color: var(--electric-200); font-weight: 300; }
    .port-head p {
      font-size: clamp(16px, 1.8vw, 19px); color: var(--fg-2);
      line-height: 1.65; margin: 18px 0 0; max-width: 62ch;
    }
    .port-stat {
      color: var(--electric-600);
    }
    .port-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-bottom: 28px;
      padding: 12px;
      border: 1px solid var(--border-1);
      border-radius: 14px;
      background: linear-gradient(120deg, rgba(124,184,255,.08), rgba(124,184,255,.02) 60%, transparent 100%);
    }
    .port-count {
      font-family: var(--font-mono); font-size: var(--step--1); color: var(--fg-3);
    }
    .port-empty {
      margin-top: 20px;
      padding: 28px;
      border: 1px dashed var(--border-2);
      border-radius: 14px;
      color: var(--fg-2);
      background: rgba(124,184,255,.03);
    }
    .port-grid {
      column-count: 3;
      column-gap: 20px;
    }
    .port-grid .card {
      width: 100%;
      margin: 0 0 20px;
      break-inside: avoid;
      -webkit-column-break-inside: avoid;
    }
    .port-alt-row {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px dashed var(--border-2);
    }
    .port-alt-row__title {
      margin: 0 0 14px;
      font-family: var(--font-mono);
      font-size: var(--step--1);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-3);
    }
    @media (max-width: 1080px) {
      .port-grid {
        column-count: 2;
      }
    }
    @media (max-width: 720px) {
      .port-grid {
        column-count: 1;
      }
    }

    /* masonry-ish index (year groups) */
    .year-group { margin-bottom: 52px; }
    .year-group__head {
      display: flex; align-items: baseline; gap: 14px;
      padding: 12px 0 14px;
      border-bottom: 1px dashed var(--border-2);
      margin-bottom: 14px;
    }
    .year-group__year {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 300;
      font-style: italic;
      color: var(--electric-200);
      letter-spacing: -0.01em;
    }
    .year-group__count {
      font-family: var(--font-mono); font-size: var(--step--1); color: var(--fg-3);
    }
    @media (max-width: 720px) {
      .port-head {
        padding-top: 56px;
      }
      .port-toolbar {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "layout": "cards"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [open] = useTweaksHost();
      const update = (k, v) => { setTweaks(t => ({ ...t, [k]: v })); persistTweak(k, v); };

      const search = new URLSearchParams(window.location.search);
      const initialKind = search.get('kind');
      const initialRole = search.get('role');
      const [filter] = React.useState(() => {
        if (initialRole) return { mode: 'role', value: initialRole };
        if (initialKind) return { mode: 'kind', value: initialKind };
        return { mode: 'kind', value: 'all' };
      });
      const getProjectYear = (project) => {
        const yearMatch = String(project.year || '').match(/\d{4}/);
        return yearMatch ? Number(yearMatch[0]) : 0;
      };
      const projects = [...window.PROJECTS].sort((a, b) => getProjectYear(b) - getProjectYear(a));
      const growingCount = projects.filter((p) => {
        const title = String(p.title || '').toLowerCase();
        return p.slug === 'telegram-bot-heymax' || title.includes('nus fintech');
      }).length;
      const grownCount = projects.length - growingCount;
      const filtered = projects.filter((p) => {
        if (filter.mode === 'role') {
          return window.deriveRoleCategory(p.role).key === filter.value;
        }
        if (filter.value === 'all') return true;
        return p.kind === filter.value;
      });

      const byYear = React.useMemo(() => {
        const m = {};
        filtered.forEach(p => { (m[p.year] = m[p.year] || []).push(p); });
        return Object.keys(m).sort().reverse().map(y => ({ year: y, items: m[y] }));
      }, [filtered]);
      const newVersionProjects = [...(window.PROJECTS_NEW_VERSIONS || [])].sort((a, b) => getProjectYear(b) - getProjectYear(a));
      const filteredNewVersions = newVersionProjects.filter((p) => {
        if (filter.mode === 'role') {
          return window.deriveRoleCategory(p.role).key === filter.value;
        }
        if (filter.value === 'all') return true;
        return p.kind === filter.value;
      });
      return (
        <>
          <Nav current="portfolio" />
          <main className="page hero-backdrop">
            <header className="port-head">
              <Eyebrow>
                <span className="port-stat">{projects.length}</span> in the garden ✦ <span className="port-stat">{growingCount}</span> Growing 🪴 ✦ <span className="port-stat">{grownCount}</span> Grown 💐
              </Eyebrow>
              <h1>things i've <em>designed</em> and <em>built</em>.</h1>
              <p>
                a mix of product design, engineering, and the occasional tools-for-myself experiment. each card links to a case study — some are long-form deep dives, others are short skims.
              </p>
            </header>

            {filtered.length === 0 && (
              <div className="port-empty">
                nothing in bloom for this filter yet.
              </div>
            )}

            {tweaks.layout === 'list' && (
              <div>
                {filtered.map(p => <ListRow key={p.slug} project={p} />)}
              </div>
            )}

            {tweaks.layout === 'cards' && (
              <>
                <div className="port-grid">
                  {filtered.map(p => <ProjectCard key={p.slug} project={p} />)}
                </div>
                {filteredNewVersions.length > 0 && (
                  <section className="port-alt-row">
                    <h2 className="port-alt-row__title">new standalone versions</h2>
                    <div className="port-grid">
                      {filteredNewVersions.map(p => <ProjectCard key={p.slug} project={p} />)}
                    </div>
                  </section>
                )}
              </>
            )}

            {tweaks.layout === 'years' && (
              <div>
                {byYear.map(group => (
                  <div className="year-group" key={group.year}>
                    <div className="year-group__head">
                      <span className="year-group__year">{group.year}</span>
                      <span className="year-group__count">{group.items.length} project{group.items.length === 1 ? '' : 's'}</span>
                    </div>
                    {group.items.map(p => <ListRow key={p.slug} project={p} />)}
                  </div>
                ))}
              </div>
            )}

            <footer className="footer">
              <span>tended with love and care 💫</span>
            </footer>
          </main>

          <div className={`tweaks ${open ? 'tweaks--open' : ''}`}>
            <h3 className="tweaks__title">Tweaks</h3>
            <div className="tweaks__sub">portfolio layout</div>
            <div className="tweaks__row">
              <label className="tweaks__label">layout</label>
              <div className="tweaks__seg">
                {['cards','list','years'].map(k => (
                  <button key={k} aria-pressed={tweaks.layout === k} onClick={() => update('layout', k)}>{k}</button>
                ))}
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
