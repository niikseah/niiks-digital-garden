<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>projects — niik</title>
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <link rel="stylesheet" href="shared/shell.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="shared/data.js"></script>
  <script src="shared/components.js"></script>
  <style>
    .port-head {
      padding: 84px 0 44px;
      border-bottom: 1px dashed var(--border-2);
      margin-bottom: 22px;
    }
    .port-head h1 {
      font-family: var(--font-display);
      font-size: clamp(40px, 5.5vw, 64px);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.04;
      color: var(--fg-1);
      margin: 14px 0 0;
      max-width: 18ch;
    }
    .port-head h1 em { font-style: italic; color: var(--electric-200); font-weight: 300; }
    .port-head p {
      font-size: 16px; color: var(--fg-2);
      line-height: 1.6; margin: 20px 0 0; max-width: 56ch;
    }
    .port-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .port-count {
      font-family: var(--font-mono); font-size: 12px; color: var(--fg-3);
    }

    /* grid layout */
    .grid-layout {
      display: flex;
      flex-wrap: nowrap;
      gap: 18px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 8px;
      width: 100%;
      scroll-snap-type: x proximity;
      scrollbar-gutter: stable;
      -webkit-overflow-scrolling: touch;
    }
    .grid-layout .card {
      flex: 0 0 min(420px, calc(100vw - 64px));
      scroll-snap-align: start;
    }
    .grid-layout::-webkit-scrollbar {
      height: 8px;
    }
    .grid-layout::-webkit-scrollbar-thumb {
      background: rgba(124,184,255,.28);
      border-radius: 999px;
    }
    .grid-layout::-webkit-scrollbar-track {
      background: rgba(124,184,255,.08);
      border-radius: 999px;
    }

    /* masonry-ish index (year groups) */
    .year-group { margin-bottom: 48px; }
    .year-group__head {
      display: flex; align-items: baseline; gap: 14px;
      padding: 10px 0 14px;
      border-bottom: 1px dashed var(--border-2);
      margin-bottom: 10px;
    }
    .year-group__year {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 300;
      font-style: italic;
      color: var(--electric-200);
      letter-spacing: -0.01em;
    }
    .year-group__count {
      font-family: var(--font-mono); font-size: 12px; color: var(--fg-3);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "layout": "grid",
      "showThumbs": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [open] = useTweaksHost();
      const update = (k, v) => { setTweaks(t => ({ ...t, [k]: v })); persistTweak(k, v); };

      const [filter, setFilter] = React.useState('all');
      const projects = window.PROJECTS;
      const filtered = filter === 'all' ? projects : projects.filter(p => p.kind === filter);

      const byYear = React.useMemo(() => {
        const m = {};
        filtered.forEach(p => { (m[p.year] = m[p.year] || []).push(p); });
        return Object.keys(m).sort().reverse().map(y => ({ year: y, items: m[y] }));
      }, [filtered]);

      return (
        <>
          <Nav current="portfolio" />
          <main className="page hero-backdrop">
            <header className="port-head">
              <Eyebrow>projects · {projects.length} in the garden</Eyebrow>
              <h1>things i've <em>designed</em> and <em>built</em>.</h1>
              <p>
                a mix of product design, engineering, and the occasional tools-for-myself experiment. each card links to a case study — some are long-form deep dives, others are short skims.
              </p>
            </header>

            <div className="port-toolbar">
              <div className="filterbar">
                {[
                  { key: 'all', label: 'all' },
                  { key: 'uiux', label: 'ui/ux' },
                  { key: 'code', label: 'code' },
                ].map(f => (
                  <button key={f.key} aria-pressed={filter === f.key} onClick={() => setFilter(f.key)}>
                    {f.label}
                  </button>
                ))}
              </div>
              <div className="port-count">
                {filtered.length} shown · {tweaks.layout} view
              </div>
            </div>

            {tweaks.layout === 'grid' && (
              <div className="grid-layout">
                {filtered.map(p => <ProjectCard key={p.slug} project={p} showThumb={tweaks.showThumbs} />)}
              </div>
            )}

            {tweaks.layout === 'list' && (
              <div>
                {filtered.map(p => <ListRow key={p.slug} project={p} />)}
              </div>
            )}

            {tweaks.layout === 'years' && (
              <div>
                {byYear.map(group => (
                  <div className="year-group" key={group.year}>
                    <div className="year-group__head">
                      <span className="year-group__year">{group.year}</span>
                      <span className="year-group__count">{group.items.length} project{group.items.length === 1 ? '' : 's'}</span>
                    </div>
                    {group.items.map(p => <ListRow key={p.slug} project={p} />)}
                  </div>
                ))}
              </div>
            )}

            <Footer />
          </main>

          <div className={`tweaks ${open ? 'tweaks--open' : ''}`}>
            <h3 className="tweaks__title">Tweaks</h3>
            <div className="tweaks__sub">portfolio layout</div>
            <div className="tweaks__row">
              <label className="tweaks__label">layout</label>
              <div className="tweaks__seg">
                {['grid','list','years'].map(k => (
                  <button key={k} aria-pressed={tweaks.layout === k} onClick={() => update('layout', k)}>{k}</button>
                ))}
              </div>
            </div>
            <div className="tweaks__row">
              <label className="tweaks__label">thumbnails (grid)</label>
              <div className="tweaks__seg">
                <button aria-pressed={tweaks.showThumbs} onClick={() => update('showThumbs', true)}>on</button>
                <button aria-pressed={!tweaks.showThumbs} onClick={() => update('showThumbs', false)}>off</button>
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
