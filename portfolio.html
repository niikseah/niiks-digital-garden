<!doctype html>
<html lang="en" data-theme="day">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>projects — niik</title>
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="shared/data.js"></script>
  <script src="shared/components.js"></script>
  <style>
    .page.hero-backdrop::before,
    .page.hero-backdrop::after {
      display: none;
    }

    .port-shell {
      max-width: 1160px;
      margin: 0 auto;
    }
    .port-head {
      padding: clamp(58px, 7vw, 92px) 0 28px;
      border-bottom: 1px solid var(--border-1);
      margin-bottom: 18px;
    }
    .port-head h1 {
      font-family: var(--font-display);
      font-size: clamp(40px, 5.5vw, 64px);
      font-weight: 400;
      letter-spacing: -0.028em;
      line-height: 1.02;
      color: var(--fg-1);
      margin: 14px 0 0;
      max-width: 14ch;
    }
    .port-head h1 em { font-style: italic; color: var(--electric-200); font-weight: 300; }
    .port-head p {
      font-size: var(--step-0); color: var(--fg-2);
      line-height: 1.65; margin: 18px 0 0; max-width: 62ch;
    }
    .port-stat {
      color: var(--electric-600);
    }
    .port-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-bottom: 18px;
      padding: 10px 12px;
      border: 1px solid var(--border-1);
      border-radius: 14px;
      background: color-mix(in srgb, var(--bg-3) 96%, var(--electric-100) 4%);
    }
    .port-count {
      font-family: var(--font-mono); font-size: var(--step--1); color: var(--fg-3);
    }
    .port-empty {
      margin-top: 16px;
      padding: 28px;
      border: 1px dashed var(--border-2);
      border-radius: 14px;
      color: var(--fg-2);
      background: rgba(124,184,255,.03);
    }
    .port-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 18px;
      width: 100%;
    }
    .port-column {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .port-grid .card {
      width: 100%;
      max-width: none;
      height: auto;
      margin: 0;
    }
    /* masonry-ish index (year groups) */
    .year-group { margin-bottom: 48px; }
    .year-group__head {
      display: flex; align-items: baseline; gap: 14px;
      padding: 12px 0 14px;
      border-bottom: 1px dashed var(--border-2);
      margin-bottom: 14px;
    }
    .year-group__year {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 300;
      font-style: italic;
      color: var(--electric-200);
      letter-spacing: -0.01em;
    }
    .year-group__count {
      font-family: var(--font-mono); font-size: var(--step--1); color: var(--fg-3);
    }
    @media (max-width: 1080px) {
      .port-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 720px) {
      .port-grid {
        grid-template-columns: 1fr;
      }
      .port-head {
        padding-top: 52px;
      }
      .port-toolbar {
        padding: 10px;
      }
    }
  </style>
  <link rel="stylesheet" href="shared/shell.css" />
  <link rel="stylesheet" href="shared/phase1-ds-bridge.css" />
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "layout": "cards"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [open] = useTweaksHost();
      const update = (k, v) => { setTweaks(t => ({ ...t, [k]: v })); persistTweak(k, v); };
      const [columnCount, setColumnCount] = React.useState(() => {
        if (window.innerWidth <= 720) return 1;
        if (window.innerWidth <= 1080) return 2;
        return 3;
      });

      const search = new URLSearchParams(window.location.search);
      const initialKind = search.get('kind');
      const initialRole = search.get('role');
      const [filter] = React.useState(() => {
        if (initialRole) return { mode: 'role', value: initialRole };
        if (initialKind) return { mode: 'kind', value: initialKind };
        return { mode: 'kind', value: 'all' };
      });
      const getProjectYear = (project) => {
        const yearMatch = String(project.year || '').match(/\d{4}/);
        return yearMatch ? Number(yearMatch[0]) : 0;
      };
      const merged = [...(window.PROJECTS_NEW_VERSIONS || []), ...(window.PROJECTS || [])];
      const seen = new Set();
      const projects = merged
        .filter((project) => {
          const key = project?.slug || `${project?.title}-${project?.year}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => getProjectYear(b) - getProjectYear(a));
      const stageCounts = projects.reduce((acc, project) => {
        const status = ['planted', 'growing', 'grown'].includes(String(project.status || '').toLowerCase())
          ? String(project.status).toLowerCase()
          : 'grown';
        acc[status] += 1;
        return acc;
      }, { planted: 0, growing: 0, grown: 0 });
      const filtered = projects.filter((p) => {
        if (filter.mode === 'role') {
          return window.deriveRoleCategory(p.role).key === filter.value;
        }
        if (filter.value === 'all') return true;
        return p.kind === filter.value;
      });
      React.useEffect(() => {
        const onResize = () => {
          if (window.innerWidth <= 720) setColumnCount(1);
          else if (window.innerWidth <= 1080) setColumnCount(2);
          else setColumnCount(3);
        };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      const columns = React.useMemo(() => {
        const bins = Array.from({ length: columnCount }, () => []);
        filtered.forEach((p, idx) => bins[idx % columnCount].push(p));
        return bins;
      }, [filtered, columnCount]);

      const byYear = React.useMemo(() => {
        const m = {};
        filtered.forEach(p => { (m[p.year] = m[p.year] || []).push(p); });
        return Object.keys(m).sort().reverse().map(y => ({ year: y, items: m[y] }));
      }, [filtered]);
      return (
        <>
          <Nav current="portfolio" />
          <main className="page hero-backdrop">
            <div className="port-shell">
              <header className="port-head">
                <Eyebrow style={{ textTransform: 'none' }}>
                  <span className="port-stat">{projects.length}</span> projects
                  {' '}🌱 {stageCounts.planted} planted
                  {' '}🌿 {stageCounts.growing} growing
                  {' '}💐 {stageCounts.grown} grown
                </Eyebrow>
                <h1>Thing's I've <em>designed</em> and <em>built</em></h1>
              </header>

              {filtered.length > 0 ? (
                <div className="port-grid">
                  {columns.map((group, colIdx) => (
                    <div className="port-column" key={`col-${colIdx}`}>
                      {group.map((p) => (
                        <ProjectCard key={p.slug} project={p} />
                      ))}
                    </div>
                  ))}
                </div>
              ) : null}

              <Footer />
            </div>
          </main>

          <div className={`tweaks ${open ? 'tweaks--open' : ''}`}>
            <h3 className="tweaks__title">Tweaks</h3>
            <div className="tweaks__sub">portfolio layout</div>
            <div className="tweaks__row">
              <label className="tweaks__label">layout</label>
              <div className="tweaks__seg">
                {['cards','list','years'].map(k => (
                  <button key={k} aria-pressed={tweaks.layout === k} onClick={() => update('layout', k)}>{k}</button>
                ))}
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
