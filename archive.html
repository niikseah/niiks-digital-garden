<!doctype html>
<html lang="en" data-theme="day">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>archive — niik</title>
  <link rel="stylesheet" href="design-system/colors_and_type.css" />
  <link rel="stylesheet" href="shared/shell.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="shared/data.js"></script>
  <script src="shared/components.js"></script>
  <style>
    .port-head {
      padding: clamp(72px, 8vw, 104px) 0 40px;
      border-bottom: 1px dashed var(--border-2);
      margin-bottom: 26px;
    }
    .port-head h1 {
      font-family: var(--font-display);
      font-size: clamp(44px, 6vw, 72px);
      font-weight: 400;
      letter-spacing: -0.028em;
      line-height: 1.02;
      color: var(--fg-1);
      margin: 14px 0 0;
      max-width: 14ch;
    }
    .port-head h1 em { font-style: italic; color: var(--electric-200); font-weight: 300; }
    .port-head p {
      font-size: clamp(16px, 1.8vw, 19px);
      color: var(--fg-2);
      line-height: 1.65;
      margin: 18px 0 0;
      max-width: 62ch;
    }
    .port-grid {
      column-count: 3;
      column-gap: 20px;
    }
    .port-grid .card {
      width: 100%;
      margin: 0 0 20px;
      break-inside: avoid;
      -webkit-column-break-inside: avoid;
    }
    @media (max-width: 1080px) { .port-grid { column-count: 2; } }
    @media (max-width: 720px) { .port-grid { column-count: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    function App() {
      const getProjectYear = (project) => {
        const yearMatch = String(project.year || '').match(/\d{4}/);
        return yearMatch ? Number(yearMatch[0]) : 0;
      };
      const projects = [...window.PROJECTS].sort((a, b) => getProjectYear(b) - getProjectYear(a));

      return (
        <>
          <Nav current="portfolio" />
          <main className="page hero-backdrop">
            <header className="port-head">
              <Eyebrow>archive</Eyebrow>
              <h1>past <em>projects</em>.</h1>
              <p>
                earlier work and previous case-study versions.
              </p>
              <p>
                <a href="portfolio.html">back to projects →</a>
              </p>
            </header>

            <div className="port-grid">
              {projects.map((p) => <ProjectCard key={p.slug} project={p} />)}
            </div>

            <footer className="footer">
              <span>tended with love and care 💫</span>
            </footer>
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
