<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — niik</title>
  <link rel="stylesheet" href="../design-system/colors_and_type.css" />
  <link rel="stylesheet" href="../shared/shell.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/components.js"></script>
  <style>
    .cs-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 36px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--fg-3);
      text-decoration: none;
    }
    .cs-back:hover { color: var(--fg-1); }

    .cs-body { max-width: 820px; margin: 0 auto; padding-top: 22px; }
    .cs-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--fg-3);
    }
    .cs-meta .dot {
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.5;
    }
    .cs-title {
      font-family: var(--font-display);
      font-size: clamp(38px, 5vw, 58px);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.06;
      color: var(--fg-1);
      margin: 14px 0 0;
    }
    .cs-subtitle {
      margin-top: 14px;
      font-size: 18px;
      line-height: 1.6;
      color: var(--fg-2);
      max-width: 62ch;
    }
    .cs-summary {
      margin-top: 28px;
      padding: 20px;
      border: 1px solid var(--border-1);
      border-radius: 14px;
      background: var(--midnight-850);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }
    .cs-summary dt {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-3);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .cs-summary dd {
      margin: 0;
      font-size: 14px;
      color: var(--fg-1);
      line-height: 1.5;
    }
    .cs-cover {
      margin-top: 24px;
      border-radius: 14px;
      border: 1px solid var(--border-1);
      overflow: hidden;
      background: var(--midnight-850);
    }
    .cs-cover img {
      width: 100%;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }
    .cs-gallery {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .cs-gallery figure {
      margin: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border-1);
      background: var(--midnight-850);
    }
    .cs-gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }
    .cs-section {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px dashed var(--border-2);
    }
    .cs-section h2 {
      font-family: var(--font-display);
      font-size: clamp(28px, 3.2vw, 36px);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
      color: var(--fg-1);
    }
    .cs-section p {
      font-size: 16px;
      line-height: 1.65;
      color: var(--fg-2);
      margin: 0 0 12px;
      max-width: 62ch;
    }
    .cs-section ul {
      margin: 0;
      padding-left: 20px;
      color: var(--fg-2);
      line-height: 1.65;
      max-width: 62ch;
    }
    .cs-section li + li { margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    function getBasePath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (window.location.hostname.endsWith('github.io') && parts.length > 0) {
        return `/${parts[0]}/`;
      }
      return '/';
    }

    function siteHref(relativePath) {
      return `${getBasePath()}${relativePath}`;
    }

    function App() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug') || window.FEATURED[0];
      const project = window.PROJECTS.find((p) => p.slug === slug) || window.PROJECTS[0];
      const details = window.CASE_STUDIES[project.slug];

      if (!project || !details) {
        return (
          <>
            <Nav current="portfolio" />
            <main className="page hero-backdrop">
              <a className="cs-back" href={siteHref('portfolio.html')}>← back to projects</a>
              <article className="cs-body">
                <h1 className="cs-title">Project not found</h1>
                <p className="cs-subtitle">The selected case study slug is missing from your content data.</p>
              </article>
            </main>
          </>
        );
      }

      return (
        <>
          <Nav current="portfolio" />
          <main className="page hero-backdrop">
            <a className="cs-back" href={siteHref('portfolio.html')}>← back to projects</a>
            <article className="cs-body">
              <div className="cs-meta">
                <Kind type={project.kind}>{project.kindLabel}</Kind>
                <span className="dot"></span>
                <span>{project.year}</span>
                <span className="dot"></span>
                <span>{project.role}</span>
              </div>

              <h1 className="cs-title">{project.title}</h1>
              <p className="cs-subtitle">{details.subtitle}</p>
              {details.heroImage && (
                <div className="cs-cover">
                  <img src={siteHref(details.heroImage)} alt={`${project.title} cover`} loading="lazy" />
                </div>
              )}

              <dl className="cs-summary">
                <div>
                  <dt>Timeline</dt>
                  <dd>{details.timeline}</dd>
                </div>
                <div>
                  <dt>Tools</dt>
                  <dd>{details.tools}</dd>
                </div>
                <div>
                  <dt>Focus</dt>
                  <dd>{project.kindLabel}</dd>
                </div>
                <div>
                  <dt>Role</dt>
                  <dd>{project.role}</dd>
                </div>
              </dl>

              {details.sections.map((section, idx) => (
                <section className="cs-section" key={`${project.slug}-section-${idx}`}>
                  <h2>{section.header}</h2>
                  {section.body && section.body.map((line, lineIdx) => (
                    <p key={`${project.slug}-body-${idx}-${lineIdx}`}>{line}</p>
                  ))}
                  {section.bullets && (
                    <ul>
                      {section.bullets.map((item, itemIdx) => (
                        <li key={`${project.slug}-bullet-${idx}-${itemIdx}`}>{item}</li>
                      ))}
                    </ul>
                  )}
                </section>
              ))}

              {details.gallery && details.gallery.length > 0 && (
                <section className="cs-section">
                  <h2>Gallery</h2>
                  <div className="cs-gallery">
                    {details.gallery.map((imgPath, idx) => (
                      <figure key={`${project.slug}-gallery-${idx}`}>
                        <img src={siteHref(imgPath)} alt={`${project.title} visual ${idx + 1}`} loading="lazy" />
                      </figure>
                    ))}
                  </div>
                </section>
              )}

              <Footer />
            </article>
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
