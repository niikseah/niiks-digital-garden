<!doctype html>
<html lang="en" data-theme="day">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project — niik</title>
  <link rel="stylesheet" href="../design-system/colors_and_type.css" />
  <link rel="stylesheet" href="../shared/shell.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="../shared/data.js"></script>
  <script src="../shared/components.js"></script>
  <style>
    .cs-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 28px;
      font-family: var(--font-mono);
      font-size: var(--step--1);
      color: var(--fg-3);
      text-decoration: none;
      transition: color var(--dur-2) var(--ease-out), transform var(--dur-2) var(--ease-out);
    }
    .cs-back:hover { color: var(--fg-1); transform: translateX(-2px); }

    .cs-body {
      max-width: 980px;
      margin: 0 auto;
      padding-top: 18px;
      padding-bottom: 80px;
    }
    .cs-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: var(--step--1);
      color: var(--fg-3);
    }
    .cs-meta .dot {
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.5;
    }
    .cs-title {
      font-family: var(--font-display);
      font-size: clamp(42px, 6vw, 68px);
      font-weight: 400;
      letter-spacing: -0.028em;
      line-height: 1.02;
      color: var(--fg-1);
      margin: 12px 0 0;
      max-width: 14ch;
      text-wrap: balance;
    }
    .cs-subtitle {
      margin-top: 16px;
      font-size: clamp(16px, 1.8vw, 19px);
      line-height: 1.68;
      color: var(--fg-2);
      max-width: none;
      width: 100%;
      text-wrap: pretty;
    }
    .cs-summary {
      margin-top: 32px;
      padding: 22px;
      border: 1px solid var(--border-1);
      border-radius: 14px;
      background: linear-gradient(120deg, rgba(124,184,255,.08), rgba(124,184,255,.02) 60%, transparent 100%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }
    .cs-summary dt {
      font-family: var(--font-body);
      font-size: var(--step--1);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-3);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .cs-summary dd {
      margin: 0;
      font-size: var(--step-0);
      color: var(--fg-1);
      line-height: 1.5;
    }
    .cs-cover {
      margin-top: 30px;
      border-radius: 18px;
      border: 1px solid var(--border-1);
      overflow: hidden;
      background: color-mix(in srgb, var(--bg-3) 92%, var(--electric-500) 8%);
      box-shadow: 0 20px 42px -28px rgba(30,87,232,.5), var(--shadow-2);
    }
    .cs-cover img {
      width: 100%;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }
    .cs-gallery {
      margin-top: 26px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .cs-gallery figure {
      margin: 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-1);
      background: var(--bg-3);
      box-shadow: 0 10px 24px -22px rgba(30,87,232,.5);
    }
    .cs-gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      transition: transform var(--dur-3) var(--ease-out);
    }
    .cs-gallery figure:hover img { transform: scale(1.03); }
    .cs-section {
      margin-top: 56px;
      padding: 26px 24px 8px;
      border: 1px solid var(--border-1);
      border-radius: 16px;
      background: color-mix(in srgb, var(--bg-3) 94%, var(--electric-500) 6%);
    }
    .cs-section h2 {
      font-family: var(--font-display);
      font-size: clamp(28px, 3.2vw, 36px);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
      color: var(--fg-1);
    }
    .cs-section p {
      font-size: var(--step-0);
      line-height: 1.72;
      color: var(--fg-2);
      margin: 0 0 14px;
      max-width: none;
      width: 100%;
    }
    .cs-section ul {
      margin: 0;
      padding-left: 20px;
      color: var(--fg-2);
      line-height: 1.65;
      max-width: none;
      width: 100%;
    }
    .cs-section li + li { margin-top: 8px; }
    .cs-section ul li::marker { color: var(--electric-300); }
    @media (hover: hover) {
      .cs-section {
        transition: border-color var(--dur-2) var(--ease-out), transform var(--dur-2) var(--ease-out);
      }
      .cs-section:hover {
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }
      .cs-gallery figure {
        transition: border-color var(--dur-2) var(--ease-out), transform var(--dur-2) var(--ease-out);
      }
      .cs-gallery figure:hover {
        border-color: var(--border-strong);
        transform: translateY(-2px);
      }
    }
    .cs-reveal {
      opacity: 0;
      transform: translateY(10px) scale(0.995);
      animation: leafUnfold 420ms var(--ease-out) forwards;
      will-change: transform, opacity;
    }
    @keyframes leafUnfold {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @media (max-width: 720px) {
      .cs-back { margin-top: 20px; }
      .cs-body { padding-top: 10px; }
      .cs-section {
        padding: 22px 18px 6px;
        margin-top: 40px;
      }
      .cs-summary {
        grid-template-columns: 1fr 1fr;
      }
      .cs-gallery {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .cs-reveal {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    function getBasePath() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      if (window.location.hostname.endsWith('github.io') && parts.length > 0) {
        return `/${parts[0]}/`;
      }
      return '/';
    }

    function siteHref(relativePath) {
      return `${getBasePath()}${relativePath}`;
    }

    function App() {
      const revealDelay = (step) => ({ animationDelay: `${step * 70}ms` });
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug') || window.FEATURED[0];
      const project = window.PROJECTS.find((p) => p.slug === slug) || window.PROJECTS[0];
      const details = window.CASE_STUDIES[project.slug];

      if (!project || !details) {
        return (
          <>
            <Nav current="portfolio" />
            <main className="page hero-backdrop">
              <a className="cs-back" href={siteHref('portfolio.html')}>← back to projects</a>
              <article className="cs-body">
                <h1 className="cs-title">Project not found</h1>
                <p className="cs-subtitle">The selected case study slug is missing from your content data.</p>
              </article>
            </main>
          </>
        );
      }

      return (
        <>
          <Nav current="portfolio" />
          <main className="page hero-backdrop">
            <a className="cs-back" href={siteHref('portfolio.html')}>← back to projects</a>
            <article className="cs-body">
              <div className="cs-meta cs-reveal" style={revealDelay(0)}>
                <Kind type={project.kind}>{project.kindLabel}</Kind>
                <span className="dot"></span>
                <span>{project.year}</span>
                <span className="dot"></span>
                <span>{project.role}</span>
              </div>

              <h1 className="cs-title cs-reveal" style={revealDelay(1)}>{project.title}</h1>
              <p className="cs-subtitle cs-reveal" style={{ ...revealDelay(2), maxWidth: 'none', width: '100%' }}>{details.subtitle}</p>
              {details.heroImage && (
                <div className="cs-cover cs-reveal" style={revealDelay(3)}>
                  <img src={siteHref(details.heroImage)} alt={`${project.title} cover`} loading="lazy" />
                </div>
              )}

              <dl className="cs-summary cs-reveal" style={revealDelay(4)}>
                <div>
                  <dt>Timeline</dt>
                  <dd>{details.timeline}</dd>
                </div>
                <div>
                  <dt>Tools</dt>
                  <dd>{details.tools}</dd>
                </div>
                <div>
                  <dt>Focus</dt>
                  <dd>{project.kindLabel}</dd>
                </div>
                <div>
                  <dt>Role</dt>
                  <dd>{project.role}</dd>
                </div>
              </dl>

              {details.sections.map((section, idx) => (
                <section className="cs-section cs-reveal" style={revealDelay(5 + idx)} key={`${project.slug}-section-${idx}`}>
                  <h2>{section.header}</h2>
                  {section.body && section.body.map((line, lineIdx) => (
                    <p key={`${project.slug}-body-${idx}-${lineIdx}`} style={{ maxWidth: 'none', width: '100%' }}>{line}</p>
                  ))}
                  {section.bullets && (
                    <ul style={{ maxWidth: 'none', width: '100%' }}>
                      {section.bullets.map((item, itemIdx) => (
                        <li key={`${project.slug}-bullet-${idx}-${itemIdx}`}>{item}</li>
                      ))}
                    </ul>
                  )}
                </section>
              ))}

              {details.gallery && details.gallery.length > 0 && (
                <section className="cs-section cs-reveal" style={revealDelay(6 + details.sections.length)}>
                  <h2>Gallery</h2>
                  <div className="cs-gallery">
                    {details.gallery.map((imgPath, idx) => (
                      <figure key={`${project.slug}-gallery-${idx}`}>
                        <img src={siteHref(imgPath)} alt={`${project.title} visual ${idx + 1}`} loading="lazy" />
                      </figure>
                    ))}
                  </div>
                </section>
              )}

              <Footer />
            </article>
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
